<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="counter">
        <button type="button" name="decrease" class="dec" onclick="decrease()">-</button>
        <p class="value" id="v">0</p>
        <button type="button" name="increase" class="inc" onclick="increase()">+</button>
    </div>
</body>
</html>
